<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1">
        <animate attributeName="stop-color" values="#3B82F6;#10B981;#3B82F6" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1">
        <animate attributeName="stop-color" values="#1E3A8A;#064E3B;#1E3A8A" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="url(#gradient)" filter="url(#glow)">
    C M S
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </text>
  <path d="M50 110 Q 200 140 350 110" fill="none" stroke="url(#gradient)" stroke-width="4">
    <animate attributeName="stroke-dasharray" from="0, 500" to="500, 0" dur="2s" fill="freeze" />
  </path>
</svg>
